<!-- chatbot/templates/chatbot/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GMIU ChatBot</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .loading {
            display: inline-block;
            margin-left: 10px;
        }

        .loading span {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background-color: #888;
            border-radius: 50%;
            animation: dot-flashing 1s infinite linear;
        }

        .loading span:nth-child(1) {
            animation-delay: 0s;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot-flashing {
            0% {
                background-color: #888;
            }

            50%,
            100% {
                background-color: #fff;
            }
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .chat-header,
        .chat-footer {
            padding: 10px;
            background-color: #f8f9fa;
        }

        .chat-header {
            border-bottom: 1px solid #ddd;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-bubble {
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
            max-width: 75%;
        }

        .chat-bubble.sent {
            background-color: #0d6efd;
            color: white;
            align-self: flex-end;
        }

        .chat-bubble.received {
            background-color: #e9ecef;
            align-self: flex-start;
        }

        .chat-footer {
            border-top: 1px solid #ddd;
        }

        .chat-input {
            width: calc(100% - 50px);
        }
    </style>
</head>

<body>
    <nav class="navbar bg-body-tertiary py-3" data-bs-theme="dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">GMIU ChatBot</span>
        </div>
    </nav>
    <div class="my-3 chat-container">
        <div class="chat-header">
        </div>
        <div class="chat-messages" id="chatlogs">
            <div class="chat-bubble received">
                Hi, there I am ChatBot of GMIU ! How may I help you ?
            </div>
        </div>
        <div class="chat-footer d-flex align-items-center">
            <input id="userInput" type="text" class="form-control chat-input" placeholder="Type a message...">
            <button class="btn btn-primary ms-2" id="sendButton">Send</button>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            const $userInput = $('#userInput');
            const $chatlogs = $('#chatlogs');
            const $sendButton = $('#sendButton');

            function sendMessage() {
                const messageText = $userInput.val().trim();
                if (messageText !== '') {
                    const $sentMessageBubble = $('<div class="chat-bubble sent"></div>').text(messageText);
                    $chatlogs.append($sentMessageBubble);
                    $userInput.val('');
                    $chatlogs.scrollTop($chatlogs[0].scrollHeight);

                    const $loadingIndicator = $('<div class="chat-bubble received loading"></div>')
                        .html('<span></span><span></span><span></span>');
                    $chatlogs.append($loadingIndicator);
                    $chatlogs.scrollTop($chatlogs[0].scrollHeight);

                    $.get('/getanswer', { msg: messageText }).done(function (data) {
                        $loadingIndicator.remove();
                        const $receivedMessageBubble = $('<div class="chat-bubble received"></div>').html(data);
                        $chatlogs.append($receivedMessageBubble);
                        $chatlogs.scrollTop($chatlogs[0].scrollHeight);
                    });
                }
            }

            $userInput.on('keypress', function (event) {
                if (event.which === 13) {
                    event.preventDefault();
                    sendMessage();
                }
            });

            $sendButton.on('click', function () {
                sendMessage();
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
